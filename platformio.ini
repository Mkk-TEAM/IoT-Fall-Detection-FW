[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default

; min_spiffs gives ~1.9 MB for app — needed because BLE stack is ~300 KB
board_build.partitions = min_spiffs.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_BT_NIMBLE_ENABLED=0
    ; Uncomment for 20-50 Hz JSON samples on USB serial during calibration.
    ; -DIMU_SERIAL_DEBUG=1
